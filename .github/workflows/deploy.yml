name: Provision & Configure K3s

on:
  push:
    branches: [ "master" ]  # 본인의 메인 브랜치명 확인 (main 또는 master)
  workflow_dispatch:      # 필요 시 수동 실행 가능

jobs:
  # -------------------------------------------------------------------
  # 1) Terraform Job: 인프라 생성
  # -------------------------------------------------------------------
  terraform:
    name: Provision Infrastructure
    runs-on: [ self-hosted, Linux, X64 ] #본인의 Runners label 확인
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve

  # -------------------------------------------------------------------
  # 2) Ansible Job: 클러스터 구성 및 Nginx 배포
  # -------------------------------------------------------------------
  ansible:
    name: Configure K3s cluster & Deploy App
    runs-on: [ self-hosted, Linux, X64 ] #본인의 Runners label 확인
    needs: terraform  # Terraform이 성공해야만 실행됨
    env:
      ANSIBLE_HOST_KEY_CHECKING: "False"
      #Terraform outputs 대신 AWS API로 직접 조회 (aws ec2 describe-instances 명령어 실행을 위해)
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # SSH 키 설정 (Bastion 내부에서 Private 노드로 접속하기 위함)
      - name: Setup SSH private key
        run: |
          mkdir -p ~/.ssh
          cat <<EOF > ~/.ssh/id_rsa
          ${{ secrets.ANSIBLE_PRIVATE_KEY }}
          EOF
          chmod 600 ~/.ssh/id_rsa
          # 디버깅: 키 형식 확인
          head -1 ~/.ssh/id_rsa
          ssh-keygen -y -f ~/.ssh/id_rsa > ~/.ssh/id_rsa.pub || echo "Invalid key format!"

      # 2. SSH config 설정 
      - name: Setup SSH config
        run: |
          cat <<EOF > ~/.ssh/config
          Host *
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            IdentityFile ~/.ssh/id_rsa
            ForwardAgent yes
          EOF
          chmod 600 ~/.ssh/config

      # AWS API로 현재 실행 중인 인스턴스 IP 조회
      - name: Get Instance IPs from AWS API
        id: get_ips
        run: |
          # Server 노드 Public IP 조회
          SERVER_IP=$(aws ec2 describe-instances \
            --region ${AWS_DEFAULT_REGION} \
            --filters \
              "Name=tag:Name,Values=k3s-project-server" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[*].Instances[*].PublicIpAddress" \
            --output text)
          
          # Agent 노드들 Private IP 조회
          AGENT_IPS=$(aws ec2 describe-instances \
            --region ${AWS_DEFAULT_REGION} \
            --filters \
              "Name=tag:Name,Values=k3s-project-agent" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[*].Instances[*].PrivateIpAddress" \
            --output text)
          
          # 배열로 변환
          AGENT_ARRAY=($AGENT_IPS)
          
          echo "SERVER_IP=$SERVER_IP" >> $GITHUB_ENV
          echo "AGENT1_IP=${AGENT_ARRAY[0]}" >> $GITHUB_ENV
          echo "AGENT2_IP=${AGENT_ARRAY[1]}" >> $GITHUB_ENV
          
          echo "✅ Server IP: $SERVER_IP"
          echo "✅ Agent IPs: ${AGENT_ARRAY[@]}"

      # 템플릿(hosts.yml.tmpl)을 실제 인벤토리(hosts.yml)로 변환
      - name: Generate Inventory from Template
        working-directory: k3s-ansible
        run: |
          envsubst < inventory/hosts.yml.tmpl > inventory/hosts.yml
          echo "--- Generated Inventory ---"
          cat inventory/hosts.yml

      # 전체 자동 배포 스크립트 실행 (deploy.sh)
      - name: Run Deployment Script
        working-directory: k3s-ansible
        run: |
          # 스크립트에 실행 권한을 부여하고 실행합니다.
          chmod +x deploy.sh #ansible 명령어를 이용해서 site.yml 를 실행하는 방법도 있음.
          ./deploy.sh

      # GitAction에서 Prometheus, Grafana 링크 띄우기
      - name: Write Job Summary
        run: |
          echo "## 🚀 배포 완료" >> $GITHUB_STEP_SUMMARY
          echo "| 서비스 | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Prometheus | http://$SERVER_IP:30603 |" >> $GITHUB_STEP_SUMMARY
          echo "| Grafana    | http://$SERVER_IP:30665 |" >> $GITHUB_STEP_SUMMARY