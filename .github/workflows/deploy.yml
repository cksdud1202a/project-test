name: Provision & Configure K3s

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:

  terraform:
    name: Provision Infrastructure
    runs-on: [ self-hosted, Linux, X64 ]

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}

    steps:
      - uses: actions/checkout@v4

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve

      # 🔥 EC2 SSH 준비 대기
      - name: Wait for instances
        run: sleep 60


  ansible:
    name: Configure K3s cluster & Deploy App
    runs-on: [ self-hosted, Linux, X64 ]
    needs: terraform

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
      ANSIBLE_HOST_KEY_CHECKING: "False"

    steps:
      - uses: actions/checkout@v4

      - name: Install Python deps
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install boto3 botocore

      - name: Install Ansible AWS Collection
        run: |
          ansible-galaxy collection install amazon.aws

      - name: Setup SSH private key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ANSIBLE_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Debug Inventory
        working-directory: k3s-ansible
        run: |
          ansible-inventory -i inventory/hosts.aws_ec2.yml --graph
          ansible-inventory -i inventory/hosts.aws_ec2.yml --list

      - name: Run Deployment Script
        working-directory: k3s-ansible
        run: |
          chmod +x deploy.sh
          ./deploy.sh