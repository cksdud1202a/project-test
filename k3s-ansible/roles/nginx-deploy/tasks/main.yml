- name: Create Nginx Deployment
  shell: |
    kubectl apply -f - <<EOF
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: nginx-deployment
      labels:
        app: nginx
    spec:
      replicas: 2
      selector:
        matchLabels:
          app: nginx
      template:
        metadata:
          labels:
            app: nginx
        spec:
          containers:
          - name: nginx
            image: nginx:latest
            ports:
            - containerPort: 80
    EOF
  delegate_to: "{{ groups['servers'][0] }}"  # ✅ 동적 그룹 참조

- name: Create Nginx Service (NodePort)
  shell: |
    kubectl apply -f - <<EOF
    apiVersion: v1
    kind: Service
    metadata:
      name: nginx-service
    spec:
      selector:
        app: nginx
      ports:
        - protocol: TCP
          port: 80
          targetPort: 80
          nodePort: 30080
      type: NodePort
    EOF
  delegate_to: "{{ groups['servers'][0] }}"  # ✅ 동적 그룹 참조

- name: Check Nginx Deployment status
  command: kubectl get pods -l app=nginx
  register: nginx_status
  delegate_to: "{{ groups['servers'][0] }}"  # ✅ 동적 그룹 참조

- name: Show Nginx Status
  debug:
    var: nginx_status.stdout_lines