# ==============================
# Prometheus 기본 설정
# ==============================
prometheus:
  prometheusSpec:
    retention: 10d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

# ==============================
# Grafana 설정
# ==============================
grafana:
  enabled: true
  adminUser: "admin"
  adminPassword: "admin"

  service:
    type: NodePort
    nodePort: 32000

  persistence:
    enabled: true
    size: 10Gi
    storageClassName: "local-path"

  # ✅ Grafana datasource 자동 생성 (N/A 해결 핵심)
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          access: proxy
          url: http://prometheus-operated.monitoring.svc.cluster.local:9090
          isDefault: true
          editable: true

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: "K3s Cluster"
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default

  dashboards:
    default:
      k3s-cluster-19972:
        gnetId: 19972
        revision: 1
        datasource:
          - name: Prometheus
            value: Prometheus

# ==============================
# node-exporter
# ==============================
prometheus-node-exporter:
  hostRootFsMount:
    enabled: true

# ==============================
# kubelet (cgroup v2 대응)
# ==============================
kubelet:
  serviceMonitor:
    https: true
    insecureSkipVerify: true
    cAdvisor: true
    cAdvisorRelabelings:
      - action: replace
        sourceLabels: [__metrics_path__]
        targetLabel: metrics_path