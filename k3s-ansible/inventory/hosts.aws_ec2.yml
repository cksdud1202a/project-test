plugin: amazon.aws.aws_ec2

regions:
  - ap-northeast-2

filters:
  tag:Project: "k3s-project"
  instance-state-name: running

keyed_groups:
  - key: tags.Role
    prefix: ""
    separator: ""

hostnames:
  - private-ip-address

compose:
  ansible_user: ubuntu

  # 서버는 Public IP로 직접 접속
  # 에이전트는 Private IP로 접속
  ansible_host: >
    {{ public_ip_address if tags.Role == 'server'
       else private_ip_address }}

  # agent는 server 통해 Proxy 접속
  ansible_ssh_common_args: >
    {% if tags.Role == 'agent' %}
    -o ProxyCommand="ssh -W %h:%p -q ubuntu@{{ hostvars[groups['server'][0]].public_ip_address }} -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa"
    {% endif %}